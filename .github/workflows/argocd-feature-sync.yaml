name: ArgoCD Feature Sync

on:
  workflow_call:
    inputs:
      service_name:
        description: "Service name. Used as the app label selector value (app=<service_name>) and as the default suffix of feature_label."
        required: true
        type: string
      argocd_server:
        description: "ArgoCD server URL (host, e.g. argocd.example.com)."
        required: true
        type: string
      helm_value_path:
        description: "Helm parameter path to set with the image tag. Required — chart layout differs by repo (e.g. generic.image.tag vs image.tag vs web.image.tag)."
        required: true
        type: string
      image_tag:
        description: "Image tag to set on the ArgoCD application. Required — pass the tag that was just pushed to ECR (e.g. needs.pipeline.outputs.image_sha) so the feature deploy reflects the build that just ran."
        required: true
        type: string
      feature_label:
        description: "PR label that gates the sync. The job is skipped on PRs without this label. Defaults to feature:<service_name>."
        required: false
        type: string
        default: ""
    secrets:
      argocd_auth_token:
        required: true

jobs:
  sync:
    name: Sync feature image
    # Run only on PR events that aren't 'closed' AND only when the PR carries
    # the gating label. Defaults to feature:<service_name>; the caller may
    # override via the feature_label input.
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      contains(
        github.event.pull_request.labels.*.name,
        (inputs.feature_label != '' && inputs.feature_label) || format('feature:{0}', inputs.service_name)
      )
    uses: DND-IT/github-workflows/.github/workflows/argocd-cli.yaml@service-pipeline
    secrets:
      argocd_auth_token: ${{ secrets.argocd_auth_token }}
    with:
      argocd_server: ${{ inputs.argocd_server }}
      pre_run: |
        set -euo pipefail
        PR_NUMBER="${{ github.event.pull_request.number }}"
        # Selector matches what the standard fission-argocd ApplicationSet
        # template sets on per-PR Applications: app=<svc>, deployment-type=feature.
        # The trailing "-${PR_NUMBER}$" grep filters to this PR only (the prod
        # app shares the app=<svc> label but doesn't end in a PR number).
        APP_NAME=$(argocd app list -l app=${{ inputs.service_name }},deployment-type=feature -o name | grep -- "-${PR_NUMBER}$" | head -1 || true)
        if [ -z "${APP_NAME}" ]; then
          echo "::error::No ArgoCD app matched 'app=${{ inputs.service_name }},deployment-type=feature' with suffix -${PR_NUMBER}."
          echo "::error::Either the fission-argocd ApplicationSet has not yet spawned an Application for this PR (it polls every ~30 minutes), or the PR is missing the gating label."
          echo "::error::Check: argocd app list -l app=${{ inputs.service_name }},deployment-type=feature"
          exit 1
        fi
        echo "Resolved app: ${APP_NAME}"
        echo "APP_NAME=${APP_NAME}" >> "$GITHUB_ENV"
      argocd_commands: |
        app set ${APP_NAME} -p ${{ inputs.helm_value_path }}=${{ inputs.image_tag }}
