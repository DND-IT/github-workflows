name: _Lib Service Pipeline

on:
  workflow_call:
    inputs:
      service_name:
        description: "Name of the service (must match a target in matrix-config.yaml)"
        required: true
        type: string
      service_path:
        description: "Service directory (Docker context, release include-path). Overrides the value resolved from matrix config."
        required: false
        type: string
      config_path:
        description: "Path to the matrix config file. Defaults to action-config's default."
        required: false
        type: string
      slack_channel:
        description: "Slack channel ID for release notifications. Overrides the value resolved from matrix config."
        required: false
        type: string
      dockerfile_path:
        description: "Path to the Dockerfile relative to service directory. Defaults to Dockerfile."
        required: false
        type: string
      pr_environment:
        description: "Environment to push to on pull requests"
        required: false
        type: string
        default: dev
      docker_build_args:
        description: "Additional Docker build arguments (newline-separated KEY=VALUE pairs)"
        required: false
        type: string
        default: ''
      release:
        description: "Release strategy: 'auto' releases on push to main, 'gated' releases only when merged to release branch. Defaults to value from matrix-config.yaml."
        required: false
        type: string
      app_id:
        description: "GitHub App ID for authentication"
        required: true
        type: string
    outputs:
      published:
        description: "Whether a new release was published ('true' or 'false')"
        value: ${{ jobs.release.outputs.published }}
      version:
        description: "Version of the new release (e.g. 1.3.0)"
        value: ${{ jobs.release.outputs.version }}
      image_sha:
        description: "Full commit SHA used as the primary image tag"
        value: ${{ jobs.build.outputs.sha }}
      image_ref:
        description: "Full GHCR image reference"
        value: ${{ jobs.build.outputs.image_ref }}
    secrets:
      docker_secrets:
        description: "Docker build secrets (newline-separated id=value pairs)"
        required: false
      slack_bot_token:
        required: false
      app_private_key:
        required: true

env:
  GIT_USER_NAME: "tamedia-fission[bot]"
  GIT_USER_EMAIL: "238147500+tamedia-fission[bot]@users.noreply.github.com"

concurrency:
  group: service-pipeline-${{ inputs.service_name }}-${{ github.event.action == 'closed' && format('cleanup-pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}

jobs:
  # ──────────────────────────────────────────────
  # Stage 0: Setup & Validation
  # ──────────────────────────────────────────────

  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.config.outputs.matrix }}
      ecr_repository: ${{ steps.config.outputs.ecr_repository }}
      service_path: ${{ inputs.service_path || steps.config.outputs.directory }}
      charts_dir: ${{ steps.config.outputs.charts_dir }}
      aws_iam_role_name: ${{ steps.config.outputs.aws_iam_role_name }}
      aws_region: ${{ steps.config.outputs.aws_region }}
      slack_channel: ${{ inputs.slack_channel || steps.config.outputs.slack_channel }}
      release: ${{ inputs.release || steps.config.outputs.release || 'auto' }}
      version_strategy: ${{ steps.config.outputs.version_strategy || 'semver' }}
      tag_prefix: ${{ steps.config.outputs.tag_prefix || format('{0}-v', inputs.service_name) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - id: config
        uses: DND-IT/action-config@v2
        with:
          config_path: ${{ inputs.config_path }}
          target: ${{ inputs.service_name }}
          environment: ${{ github.event_name == 'pull_request' && inputs.pr_environment || '' }}


  # ──────────────────────────────────────────────
  # Stage 1: Build Image
  # ──────────────────────────────────────────────

  build:
    name: Build
    needs: [setup]
    if: github.event.action != 'closed'
    uses: ./.github/workflows/docker-build.yaml
    with:
      image_name: ${{ inputs.service_name }}
      docker_context: ${{ needs.setup.outputs.service_path }}
      dockerfile_path: ${{ inputs.dockerfile_path && format('{0}/{1}', needs.setup.outputs.service_path, inputs.dockerfile_path) || '' }}
      build_args: ${{ inputs.docker_build_args }}
    secrets:
      docker_secrets: ${{ secrets.docker_secrets }}

  # ──────────────────────────────────────────────
  # Stage 2: Release
  # ──────────────────────────────────────────────

  release:
    name: Release
    needs: [setup, build]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    env:
      IS_MAIN: ${{ github.ref_name == github.event.repository.default_branch }}
    outputs:
      published: ${{ steps.releaser.outputs.release-published }}
      version: ${{ steps.releaser.outputs.version }}
    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ inputs.app_id }}
          private-key: ${{ secrets.app_private_key }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
          persist-credentials: true
          token: ${{ steps.generate-token.outputs.token }}

      - name: Configure Git
        if: env.IS_MAIN == 'true'
        run: |
          git config --global user.name "${{ env.GIT_USER_NAME }}"
          git config --global user.email "${{ env.GIT_USER_EMAIL }}"
          git pull --rebase

      - name: Release
        id: releaser
        uses: DND-IT/action-releaser@v0
        with:
          version-strategy: ${{ needs.setup.outputs.version_strategy }}
          tag-prefix: ${{ needs.setup.outputs.tag_prefix }}
          cliff-config: ${{ needs.setup.outputs.service_path }}/cliff.toml
          include-path: ${{ needs.setup.outputs.service_path }}/**
          release-mode: ${{ env.IS_MAIN == 'true' && needs.setup.outputs.release == 'gated' && 'pr' || 'direct' }}
          dry-run: ${{ env.IS_MAIN != 'true' }}
          github-token: ${{ steps.generate-token.outputs.token }}


  # ──────────────────────────────────────────────
  # Stage 3: Tag and Push Images
  # ──────────────────────────────────────────────

  tag-push:
    name: Tag & Push ${{ matrix.environment }}
    needs: [setup, build, release]
    if: needs.release.outputs.published == 'true' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.environments) }}
    uses: ./.github/workflows/docker-push.yaml
    with:
      image_name: ${{ needs.setup.outputs.ecr_repository || inputs.service_name }}
      image_ref: ${{ needs.build.outputs.image_ref }}
      aws_account_id: ${{ matrix.aws_account_id }}
      aws_role_name: ${{ needs.setup.outputs.aws_iam_role_name }}
      aws_region: ${{ needs.setup.outputs.aws_region }}
      version_tag: ${{ needs.release.outputs.published == 'true' && github.event_name != 'pull_request' && needs.release.outputs.version || '' }}
      additional_tags: |-
        ${{ github.event_name == 'pull_request' && format('pr-{0}-{1}', github.event.pull_request.number, needs.build.outputs.sha) || needs.build.outputs.sha }}
        ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || '' }}

  # ──────────────────────────────────────────────
  # Stage 4: Deploy
  # ──────────────────────────────────────────────

  deploy:
    name: Deploy
    needs: [setup, build, release, tag-push]
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ inputs.app_id }}
          private-key: ${{ secrets.app_private_key }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.generate-token.outputs.token }}

      - name: Pull latest
        run: git pull --rebase

      - name: Deploy
        id: deployer
        uses: DND-IT/action-deployer@v0
        with:
          service: ${{ inputs.service_name }}
          version: ${{ needs.release.outputs.version }}
          sha: ${{ needs.build.outputs.sha }}
          token: ${{ steps.generate-token.outputs.token }}
          git_user_name: ${{ env.GIT_USER_NAME }}
          git_user_email: ${{ env.GIT_USER_EMAIL }}

  # ──────────────────────────────────────────────
  # Auxiliary jobs
  # ──────────────────────────────────────────────

  notify:
    name: Notify Slack
    needs: [setup, release]
    if: needs.release.outputs.published == 'true' && needs.setup.outputs.slack_channel != ''
    uses: DND-IT/github-workflows/.github/workflows/notify-slack.yaml@v3
    secrets:
      slack_bot_token: ${{ secrets.slack_bot_token }}
    with:
      channel: ${{ needs.setup.outputs.slack_channel }}
      notification_title: "New ${{ inputs.service_name }} release"
      notification_message: "${{ inputs.service_name }} ${{ needs.release.outputs.version }} has been released!"
      status: "success"
      additional_fields: |
        [
          {"name": "Service", "value": "${{ inputs.service_name }}"},
          {"name": "Version", "value": "${{ needs.release.outputs.version }}"},
          {"name": "Release", "value": "<${{ github.server_url }}/${{ github.repository }}/releases|${{ needs.release.outputs.version }}>"}
        ]
      include_workflow_link: true
      include_triggered_by: true

  cleanup:
    name: Cleanup PR Images
    needs: [setup]
    if: github.event.action == 'closed' && github.event_name == 'pull_request'
    uses: ./.github/workflows/docker-cleanup.yaml
    with:
      image_name: ${{ needs.setup.outputs.ecr_repository }}
      aws_account_id: ${{ fromJson(needs.setup.outputs.environments)[0].aws_account_id }}
      aws_role_name: ${{ needs.setup.outputs.aws_iam_role_name }}
      aws_region: ${{ needs.setup.outputs.aws_region }}
      pr_number: ${{ github.event.pull_request.number }}
