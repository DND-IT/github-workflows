name: _Lib Service Pipeline

on:
  workflow_call:
    inputs:
      service_name:
        description: "Name of the service (must match a target in matrix-config.yaml)"
        required: true
        type: string
      service_path:
        description: "Service directory (Docker context, release include-path). Overrides the value resolved from matrix config."
        required: false
        type: string
      config_path:
        description: "Path to the matrix config file. Defaults to action-config's default."
        required: false
        type: string
      slack_channel:
        description: "Slack channel ID for release notifications. Overrides the value resolved from matrix config."
        required: false
        type: string
      dockerfile_path:
        description: "Path to the Dockerfile relative to service directory. Defaults to Dockerfile."
        required: false
        type: string
      pr_environment:
        description: "Environment to push PR preview images to and run PR preview deploys against."
        required: false
        type: string
        default: dev
      docker_build_args:
        description: "Additional Docker build arguments (newline-separated KEY=VALUE pairs)"
        required: false
        type: string
        default: ''
      release:
        description: "Release strategy: 'auto' publishes on every main push with a release-worthy commit; 'gated' publishes only when the release PR merges. Defaults to value from matrix-config.yaml, then 'auto'."
        required: false
        type: string
      app_id:
        description: "GitHub App ID for authentication"
        required: true
        type: string
      git_user_name:
        description: "Git user name for commits made by the release job."
        required: false
        type: string
        default: "tamedia-fission[bot]"
      git_user_email:
        description: "Git user email for commits made by the release job."
        required: false
        type: string
        default: "238147500+tamedia-fission[bot]@users.noreply.github.com"
    outputs:
      published:
        description: "Whether a new release was published ('true' or 'false')"
        value: ${{ jobs.release.outputs.published }}
      version:
        description: "Version of the new release (e.g. 1.3.0)"
        value: ${{ jobs.release.outputs.version || jobs.setup.outputs.version }}
      image_sha:
        description: "Short commit SHA used as the primary image tag"
        value: ${{ jobs.build.outputs.sha }}
      image_ref:
        description: "Full GHCR image reference"
        value: ${{ jobs.build.outputs.image_ref }}
    secrets:
      docker_secrets:
        description: "Docker build secrets (newline-separated id=value pairs)"
        required: false
      slack_bot_token:
        required: false
      app_private_key:
        required: true

# One concurrency group per PR (or per ref on push) covers every job. Any PR
# event — including `closed` — cancels an in-flight run for the same PR.
concurrency:
  group: service-pipeline-${{ inputs.service_name }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.config.outputs.matrix }}
      ecr_repository: ${{ steps.config.outputs.ecr_repository }}
      service_path: ${{ inputs.service_path || steps.config.outputs.directory }}
      aws_iam_role_name: ${{ steps.config.outputs.aws_iam_role_name }}
      aws_region: ${{ steps.config.outputs.aws_region }}
      slack_channel: ${{ inputs.slack_channel || steps.config.outputs.slack_channel }}
      release: ${{ inputs.release || steps.config.outputs.release }}
      version_strategy: ${{ steps.config.outputs.version_strategy }}
      tag_prefix: ${{ steps.config.outputs.tag_prefix }}
      would_publish: ${{ steps.plan.outputs.version != '' }}
      version: ${{ steps.plan.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Pin to the triggering SHA so action-releaser sees the same git
          # state now and in the release job — deterministic version.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - id: config
        uses: DND-IT/action-config@v3
        with:
          config_path: ${{ inputs.config_path }}
          target: ${{ inputs.service_name }}
          environment: ${{ github.event_name == 'pull_request' && inputs.pr_environment || '' }}

      - name: Validate release strategy
        env:
          RELEASE: ${{ inputs.release || steps.config.outputs.release }}
        run: |
          if [ "$RELEASE" != "auto" ] && [ "$RELEASE" != "gated" ]; then
            echo "::error::Invalid 'release' value: '$RELEASE'. Must be 'auto' or 'gated'."
            exit 1
          fi

      # Dry-run to learn the next version BEFORE the image push — so tag-push
      # applies the version tag and the GitHub release is published only after
      # every env's ECR has the tagged image.
      - name: Plan release
        id: plan
        if: github.event.action != 'closed'
        uses: DND-IT/action-releaser@v0
        with:
          version-strategy: ${{ steps.config.outputs.version_strategy }}
          tag-prefix: ${{ steps.config.outputs.tag_prefix }}
          cliff-config: ${{ inputs.service_path || steps.config.outputs.directory }}/cliff.toml
          include-path: ${{ inputs.service_path || steps.config.outputs.directory }}/**
          release-mode: ${{ (inputs.release || steps.config.outputs.release) == 'gated' && 'pr' || 'direct' }}
          dry-run: true
          github-token: ${{ github.token }}

  build:
    name: Build
    needs: [setup]
    if: github.event.action != 'closed'
    uses: ./.github/workflows/docker-build.yaml
    with:
      image_name: ${{ inputs.service_name }}
      docker_context: ${{ needs.setup.outputs.service_path }}
      dockerfile_path: ${{ inputs.dockerfile_path && format('{0}/{1}', needs.setup.outputs.service_path || '.', inputs.dockerfile_path) || '' }}
      build_args: ${{ inputs.docker_build_args }}
    secrets:
      docker_secrets: ${{ secrets.docker_secrets }}

  tag-push:
    name: Tag & Push ${{ matrix.environment }}
    needs: [setup, build]
    # On PR events, setup's matrix is already filtered to pr_environment by
    # action-config. On push events, the full matrix runs, gated on would_publish
    # so non-release commits don't advance ECR tags.
    if: |
      github.event.action != 'closed' &&
      (github.event_name == 'pull_request' || needs.setup.outputs.would_publish == 'true')
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.environments) }}
    uses: ./.github/workflows/docker-push.yaml
    with:
      image_name: ${{ needs.setup.outputs.ecr_repository || inputs.service_name }}
      image_ref: ${{ needs.build.outputs.image_ref }}
      aws_account_id: ${{ matrix.aws_account_id }}
      aws_role_name: ${{ matrix.aws_iam_role_name || needs.setup.outputs.aws_iam_role_name }}
      aws_region: ${{ matrix.aws_region || needs.setup.outputs.aws_region }}
      version_tag: ${{ github.event_name != 'pull_request' && needs.setup.outputs.version || '' }}
      additional_tags: |-
        ${{ github.event_name == 'pull_request' && format('pr-{0}-{1}', github.event.pull_request.number, needs.build.outputs.sha) || needs.build.outputs.sha }}
        ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || '' }}

  # Publish the GitHub release only AFTER every env's tag-push succeeded.
  # If any matrix leg of tag-push fails, GHA marks the tag-push job failure
  # and this job is skipped — preserving "release exists ⇒ image in every ECR".
  release:
    name: Publish Release
    needs: [setup, build, tag-push]
    if: |
      github.event_name != 'pull_request' &&
      github.ref_name == github.event.repository.default_branch &&
      needs.setup.outputs.would_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      published: ${{ steps.releaser.outputs.release-published }}
      version: ${{ steps.releaser.outputs.version }}
      release_url: ${{ steps.releaser.outputs.release-url }}
    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ inputs.app_id }}
          private-key: ${{ secrets.app_private_key }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: true
          token: ${{ steps.generate-token.outputs.token }}

      - name: Configure Git
        run: |
          git config --global user.name "${{ inputs.git_user_name }}"
          git config --global user.email "${{ inputs.git_user_email }}"

      - name: Publish release
        id: releaser
        uses: DND-IT/action-releaser@v0
        with:
          version-strategy: ${{ needs.setup.outputs.version_strategy }}
          tag-prefix: ${{ needs.setup.outputs.tag_prefix }}
          cliff-config: ${{ needs.setup.outputs.service_path }}/cliff.toml
          include-path: ${{ needs.setup.outputs.service_path }}/**
          release-mode: ${{ needs.setup.outputs.release == 'gated' && 'pr' || 'direct' }}
          dry-run: false
          github-token: ${{ steps.generate-token.outputs.token }}

  # action-deployer walks matrix-config.yaml itself, honouring the per-env
  # `deploy: auto | pr` setting. A single call handles every environment.
  deploy:
    name: Deploy
    needs: [setup, build, tag-push, release]
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ inputs.app_id }}
          private-key: ${{ secrets.app_private_key }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.generate-token.outputs.token }}

      - name: Deploy
        uses: DND-IT/action-deployer@v0
        with:
          service: ${{ inputs.service_name }}
          version: ${{ needs.release.outputs.version }}
          sha: ${{ needs.build.outputs.sha }}
          token: ${{ steps.generate-token.outputs.token }}
          git_user_name: ${{ inputs.git_user_name }}
          git_user_email: ${{ inputs.git_user_email }}

  notify:
    name: Notify Slack
    needs: [setup, release]
    if: needs.release.outputs.published == 'true' && needs.setup.outputs.slack_channel != ''
    uses: DND-IT/github-workflows/.github/workflows/notify-slack.yaml@v3
    secrets:
      slack_bot_token: ${{ secrets.slack_bot_token }}
    with:
      channel: ${{ needs.setup.outputs.slack_channel }}
      notification_title: "New ${{ inputs.service_name }} release"
      notification_message: "${{ inputs.service_name }} ${{ needs.release.outputs.version }} has been released!"
      status: "success"
      additional_fields: |
        [
          {"name": "Service", "value": "${{ inputs.service_name }}"},
          {"name": "Version", "value": "${{ needs.release.outputs.version }}"},
          {"name": "Release", "value": "<${{ needs.release.outputs.release_url || format('{0}/{1}/releases/tag/{2}{3}', github.server_url, github.repository, needs.setup.outputs.tag_prefix, needs.release.outputs.version) }}|${{ needs.release.outputs.version }}>"}
        ]
      include_workflow_link: true
      include_triggered_by: true

  cleanup:
    name: Cleanup PR Images
    needs: [setup]
    if: github.event.action == 'closed' && github.event_name == 'pull_request'
    uses: ./.github/workflows/docker-cleanup.yaml
    with:
      image_name: ${{ needs.setup.outputs.ecr_repository || inputs.service_name }}
      aws_account_id: ${{ fromJson(needs.setup.outputs.environments)[0].aws_account_id }}
      aws_role_name: ${{ fromJson(needs.setup.outputs.environments)[0].aws_iam_role_name || needs.setup.outputs.aws_iam_role_name }}
      aws_region: ${{ fromJson(needs.setup.outputs.environments)[0].aws_region || needs.setup.outputs.aws_region }}
      pr_number: ${{ github.event.pull_request.number }}
