name: Update Helm Image Tag

on:
  workflow_call:
    inputs:
      image_tag:
        description: 'The Docker image tag to set'
        type: string
        required: true
      image_name:
        description: 'Image name to search for (mode=image). Finds all image blocks where repository ends with this name and updates their tag.'
        type: string
        default: ''
      image_tag_keys:
        description: 'Newline-separated dot-notation key paths to update (mode=key). Ignored when image_name is set.'
        type: string
        default: ''
      values_files:
        description: 'Newline-separated list of YAML file paths to update'
        type: string
        required: true
      create_pr:
        description: 'Create a pull request. If false, commits directly to the target branch.'
        type: boolean
        default: true
      pr_title:
        description: 'Custom title for the pull request.'
        type: string
        default: ''
      pr_body:
        description: 'Custom body for the pull request.'
        type: string
        default: ''
      auto_merge:
        description: 'Enable auto-merge for the pull request.'
        type: boolean
        default: false
      pr_branch:
        description: 'Branch name for the pull request. Auto-generated if empty.'
        type: string
        default: ''
      target_branch:
        description: 'Target branch for the PR or direct commit. Defaults to the default branch.'
        type: string
        default: ''
      dry_run:
        description: 'Preview changes without modifying anything.'
        type: boolean
        default: false
      app_id:
        description: 'GitHub App ID for generating a token.'
        type: string
        required: false
    secrets:
      app_private_key:
        description: 'Private key for the GitHub App.'
        required: false

jobs:
  update-helm-values:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        if: inputs.app_id != ''
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ inputs.app_id }}
          private-key: ${{ secrets.app_private_key }}

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate inputs
        run: |
          if [ -z "${{ inputs.image_tag }}" ]; then
            echo "::error::image_tag input cannot be empty"
            exit 1
          fi
          if [ -z "${{ inputs.image_name }}" ] && [ -z "${{ inputs.image_tag_keys }}" ]; then
            echo "::error::Either image_name or image_tag_keys must be provided"
            exit 1
          fi

      - name: Update YAML files (image mode)
        if: inputs.image_name != ''
        uses: dnd-it/action-yaml-update@v0
        with:
          mode: image
          files: ${{ inputs.values_files }}
          image_name: ${{ inputs.image_name }}
          image_tag: ${{ inputs.image_tag }}
          create_pr: ${{ inputs.create_pr && 'true' || 'false' }}
          pr_title: "${{ inputs.pr_title || format('chore: update {0} image tag to {1}', inputs.image_name, inputs.image_tag) }}"
          pr_body: "${{ inputs.pr_body || format('Updates image `{0}` to tag `{1}`.', inputs.image_name, inputs.image_tag) }}"
          pr_branch: ${{ inputs.pr_branch }}
          target_branch: ${{ inputs.target_branch }}
          auto_merge: ${{ inputs.auto_merge && 'true' || 'false' }}
          dry_run: ${{ inputs.dry_run && 'true' || 'false' }}
          token: ${{ inputs.app_id != '' && steps.generate-token.outputs.token || github.token }}

      - name: Update YAML files (key mode)
        if: inputs.image_name == '' && inputs.image_tag_keys != ''
        uses: dnd-it/action-yaml-update@v0
        with:
          mode: key
          files: ${{ inputs.values_files }}
          keys: ${{ inputs.image_tag_keys }}
          value: ${{ inputs.image_tag }}
          create_pr: ${{ inputs.create_pr && 'true' || 'false' }}
          pr_title: "${{ inputs.pr_title || format('chore: update image tag to {0}', inputs.image_tag) }}"
          pr_body: "${{ inputs.pr_body || format('Updates image tag to `{0}`.', inputs.image_tag) }}"
          pr_branch: ${{ inputs.pr_branch }}
          target_branch: ${{ inputs.target_branch }}
          auto_merge: ${{ inputs.auto_merge && 'true' || 'false' }}
          dry_run: ${{ inputs.dry_run && 'true' || 'false' }}
          token: ${{ inputs.app_id != '' && steps.generate-token.outputs.token || github.token }}
