name: Docker Build

on:
  workflow_call:
    secrets:
      docker_secrets:
        description: "Comma-delimited list of Github secrets to pass to docker build workflow"
        required: false
    inputs:
      environment:
        description: "Environment to deploy"
        type: string
      image_name:
        description: "Name of the Docker image to build"
        type: string
      docker_context:
        description: "Path to the build context"
        type: string
      dockerfile_path:
        description: "Path to the Dockerfile. If not defined, will default to {docker_context}/Dockerfile"
        type: string
      docker_target:
        description: "Build target"
        type: string
      build_args:
        description: "Additional Docker build arguments (newline-separated KEY=VALUE pairs)"
        type: string
        default: ""
    outputs:
      sha:
        description: "Full commit SHA used as image tag"
        value: ${{ jobs.build.outputs.sha }}
      image_ref:
        description: "Full GHCR image reference (for docker pull in downstream jobs)"
        value: ${{ jobs.build.outputs.image_ref }}

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
    env:
      SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      IMAGE_NAME: ${{ inputs.image_name || vars.image_name || github.event.repository.name }}
      DOCKERFILE_PATH: ${{ inputs.dockerfile_path || vars.dockerfile_path }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Prepare metadata
        id: meta
        run: |
          CACHE_REPO="ghcr.io/${{ github.repository }}/build-cache"
          CACHE_REPO="${CACHE_REPO,,}"
          IMAGE_REF="${CACHE_REPO}:${{ env.IMAGE_NAME }}-${SHA}"
          echo "sha=${SHA}" >> $GITHUB_OUTPUT
          echo "image_ref=${IMAGE_REF}" >> $GITHUB_OUTPUT
          echo "cache_repo=${CACHE_REPO}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v7
        env:
          DOCKER_CTX: ${{ inputs.docker_context || vars.docker_context || '.' }}
          DOCKER_TARGET: ${{ inputs.docker_target || vars.docker_target }}
        with:
          context: ${{ env.DOCKER_CTX }}
          file: ${{ env.DOCKERFILE_PATH }}
          secrets: ${{ secrets.docker_secrets }}
          push: true
          tags: ${{ steps.meta.outputs.image_ref }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.cache_repo }}:${{ env.IMAGE_NAME }}
          cache-to: type=registry,ref=${{ steps.meta.outputs.cache_repo }}:${{ env.IMAGE_NAME }},mode=max
          target: ${{ env.DOCKER_TARGET }}
          build-args: |
            VERSION=${{ steps.meta.outputs.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ steps.meta.outputs.sha }}
            ${{ inputs.build_args }}
