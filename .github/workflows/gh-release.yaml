name: GitHub Release (git-cliff)

on:
  workflow_call:
    inputs:
      service_name:
        description: "Name of the service (used for scoped tag prefix, e.g., 'titan-api'). Leave empty for whole-repo releases."
        type: string
        required: false
        default: ''
      service_path:
        description: "Path to the service directory for monorepo filtering (e.g., 'services/titan-api'). Only commits touching this path trigger releases."
        type: string
        required: false
        default: ''
      cliff_config:
        description: "Path to git-cliff configuration file. If not found, uses an embedded default."
        type: string
        required: false
        default: cliff.toml
      update_version_aliases:
        description: "Automatically update version alias tags (e.g., v1 and v1.2) to point to the latest release."
        type: boolean
        default: false
      dry_run:
        description: "Run in dry-run mode to preview the release without creating it."
        type: boolean
        default: false
      metadata_file:
        description: "File path containing extra metadata to append to the release version (e.g., build info). Empty to skip."
        type: string
        required: false
        default: ''
      app_id:
        description: "GitHub App ID for authentication"
        type: string
        required: false
    secrets:
      app_private_key:
        description: "GitHub App private key for authentication"
        required: false
    outputs:
      new_release_published:
        description: "Whether a new release was published ('true' or 'false')"
        value: ${{ jobs.release.outputs.new_release_published }}
      new_release_version:
        description: "Version of the new release (e.g. 1.3.0)"
        value: ${{ jobs.release.outputs.new_release_version }}
      new_release_major_version:
        description: "Major version of the new release (e.g. 1)"
        value: ${{ jobs.release.outputs.new_release_major_version }}
      new_release_minor_version:
        description: "Minor version of the new release (e.g. 3)"
        value: ${{ jobs.release.outputs.new_release_minor_version }}
      new_release_patch_version:
        description: "Patch version of the new release (e.g. 0)"
        value: ${{ jobs.release.outputs.new_release_patch_version }}
      new_release_git_tag:
        description: "The Git tag associated with the new release"
        value: ${{ jobs.release.outputs.new_release_git_tag }}
      new_release_git_head:
        description: "The sha of the last commit being part of the new release"
        value: ${{ jobs.release.outputs.new_release_git_head }}
      dry_run:
        description: "Whether this was a dry-run (true) or actual release (false)"
        value: ${{ jobs.release.outputs.dry_run }}

env:
  GIT_USER_NAME: "tamedia-fission[bot]"
  GIT_USER_EMAIL: "238147500+tamedia-fission[bot]@users.noreply.github.com"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}
      new_release_major_version: ${{ steps.release.outputs.new_release_major_version }}
      new_release_minor_version: ${{ steps.release.outputs.new_release_minor_version }}
      new_release_patch_version: ${{ steps.release.outputs.new_release_patch_version }}
      new_release_git_tag: ${{ steps.release.outputs.new_release_git_tag }}
      new_release_git_head: ${{ steps.release.outputs.new_release_git_head }}
      dry_run: ${{ inputs.dry_run == true || github.event_name == 'pull_request' }}
    steps:
      - name: Generate GitHub App Token
        if: inputs.app_id != ''
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ inputs.app_id }}
          private-key: ${{ secrets.app_private_key }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          fetch-tags: true
          token: ${{ inputs.app_id != '' && steps.generate-token.outputs.token || github.token }}

      - name: Temporarily merge PR branch
        if: github.event_name == 'pull_request'
        run: |
          git config user.name "${{ env.GIT_USER_NAME }}"
          git config user.email "${{ env.GIT_USER_EMAIL }}"
          git checkout ${{ github.event.pull_request.base.ref }}
          git merge --squash origin/${{ github.event.pull_request.head.ref }}
          git commit -m "${{ github.event.pull_request.title }}"

      - name: Prepare git-cliff config
        id: config
        run: |
          CONFIG="${{ inputs.cliff_config }}"

          if [ -n "$CONFIG" ] && [ -f "$CONFIG" ]; then
            echo "config_path=$CONFIG" >> $GITHUB_OUTPUT
            echo "Using cliff config: $CONFIG"
          else
            # Write embedded default config
            cat > /tmp/cliff-default.toml << 'CLIFF_EOF'
          [changelog]
          body = """
          {% if version -%}
              ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
          {% else -%}
              ## [unreleased]
          {% endif -%}

          {% for group, commits in commits | group_by(attribute="group") %}
              ### {{ group | striptags | trim | upper_first }}
              {% for commit in commits %}
                  - {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | upper_first }}\
              {% endfor %}
          {% endfor %}
          """
          trim = true

          [git]
          conventional_commits = true
          filter_unconventional = true
          commit_parsers = [
              { message = "^feat", group = "Features" },
              { message = "^fix", group = "Bug Fixes" },
              { message = "^refactor", group = "Refactor" },
              { message = "^doc", group = "Documentation" },
              { message = "^perf", group = "Performance" },
              { message = "^test", group = "Testing" },
              { message = "^chore\\(release\\)", skip = true },
              { message = "^chore\\(deps\\)", skip = true },
              { message = "^chore|^ci", group = "Miscellaneous" },
          ]
          filter_commits = false
          sort_commits = "oldest"
          CLIFF_EOF
            echo "config_path=/tmp/cliff-default.toml" >> $GITHUB_OUTPUT
            echo "Using embedded default cliff config"
          fi

      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: ${{ steps.config.outputs.config_path }}
          args: >-
            --bump
            --unreleased
            --strip header
            ${{ inputs.service_name != '' && format('--tag-pattern "^{0}-v[0-9]"', inputs.service_name) || '' }}
            ${{ inputs.service_path != '' && format('--include-path "{0}/**"', inputs.service_path) || '' }}
        env:
          OUTPUT: /tmp/RELEASE_NOTES.md

      - name: Create release
        id: release
        env:
          GH_TOKEN: ${{ inputs.app_id != '' && steps.generate-token.outputs.token || github.token }}
        run: |
          SERVICE_NAME="${{ inputs.service_name }}"
          CLIFF_VERSION="${{ steps.cliff.outputs.version }}"
          IS_DRY_RUN="${{ inputs.dry_run == true || github.event_name == 'pull_request' }}"

          # Strip service name prefix if present
          if [ -n "$SERVICE_NAME" ]; then
            VERSION="${CLIFF_VERSION#${SERVICE_NAME}-}"
          else
            VERSION="${CLIFF_VERSION#v}"
          fi

          # Handle first release (no prior tags)
          if [ -z "$VERSION" ] || [ "$VERSION" = "$CLIFF_VERSION" ]; then
            # Check if there are any conventional commits
            COMMIT_COUNT=$(git log --oneline --format="%s" | grep -cE "^(feat|fix|refactor|perf|docs?|test|chore|ci|style|build)" || true)
            if [ "$COMMIT_COUNT" -gt 0 ]; then
              VERSION="0.1.0"
              echo "First release detected, defaulting to $VERSION"
            else
              echo "No conventional commits found, nothing to release"
              echo "new_release_published=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # Build tag
          if [ -n "$SERVICE_NAME" ]; then
            TAG="${SERVICE_NAME}-v${VERSION}"
          else
            TAG="v${VERSION}"
          fi

          # Append metadata if provided
          if [ -n "${{ inputs.metadata_file }}" ] && [ -f "${{ inputs.metadata_file }}" ]; then
            METADATA=$(cat "${{ inputs.metadata_file }}")
            if [ -n "$METADATA" ]; then
              TAG="${TAG}+${METADATA}"
              VERSION="${VERSION}+${METADATA}"
            fi
          fi

          # Check if tag already exists
          if git tag --list | grep -qx "$TAG"; then
            echo "Tag $TAG already exists, nothing to release"
            echo "new_release_published=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Parse version components
          SEMVER="${VERSION%%+*}"
          MAJOR=$(echo "$SEMVER" | cut -d. -f1)
          MINOR=$(echo "$SEMVER" | cut -d. -f2)
          PATCH=$(echo "$SEMVER" | cut -d. -f3)

          echo "Version: $VERSION"
          echo "Tag: $TAG"
          echo "Major: $MAJOR, Minor: $MINOR, Patch: $PATCH"

          # Set outputs
          echo "new_release_version=$VERSION" >> $GITHUB_OUTPUT
          echo "new_release_major_version=$MAJOR" >> $GITHUB_OUTPUT
          echo "new_release_minor_version=$MINOR" >> $GITHUB_OUTPUT
          echo "new_release_patch_version=$PATCH" >> $GITHUB_OUTPUT
          echo "new_release_git_tag=$TAG" >> $GITHUB_OUTPUT
          echo "new_release_git_head=${{ github.sha }}" >> $GITHUB_OUTPUT

          if [ "$IS_DRY_RUN" = "true" ]; then
            echo "Dry run: would create tag $TAG with version $VERSION"
            echo "new_release_published=true" >> $GITHUB_OUTPUT
            echo "--- Release Notes Preview ---"
            cat /tmp/RELEASE_NOTES.md || echo "(no release notes generated)"
            exit 0
          fi

          # Create tag and release
          git config user.name "${{ env.GIT_USER_NAME }}"
          git config user.email "${{ env.GIT_USER_EMAIL }}"
          git tag -a "$TAG" -m "chore(release): $TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/RELEASE_NOTES.md \
            --target "${{ github.sha }}"

          echo "new_release_published=true" >> $GITHUB_OUTPUT

      - name: Update version alias tags
        if: steps.release.outputs.new_release_published == 'true' && inputs.update_version_aliases == true && inputs.dry_run == false && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ inputs.app_id != '' && steps.generate-token.outputs.token || github.token }}
        run: |
          SERVICE_NAME="${{ inputs.service_name }}"
          MAJOR="${{ steps.release.outputs.new_release_major_version }}"
          MINOR="${{ steps.release.outputs.new_release_minor_version }}"
          VERSION="${{ steps.release.outputs.new_release_version }}"

          if [ -n "$SERVICE_NAME" ]; then
            MAJOR_TAG="${SERVICE_NAME}-v${MAJOR}"
            MINOR_TAG="${SERVICE_NAME}-v${MAJOR}.${MINOR}"
          else
            MAJOR_TAG="v${MAJOR}"
            MINOR_TAG="v${MAJOR}.${MINOR}"
          fi

          git tag -fa "$MAJOR_TAG" -m "Update major version alias to $VERSION"
          git push origin "$MAJOR_TAG" --force

          git tag -fa "$MINOR_TAG" -m "Update minor version alias to $VERSION"
          git push origin "$MINOR_TAG" --force

          echo "Updated version aliases: $MAJOR_TAG, $MINOR_TAG"
